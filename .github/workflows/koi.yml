name: 拉取 Koi 数据
on:
  workflow_dispatch:

jobs:
  sync-koi:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Koi registry
        run: |
          mkdir -p koi
          
          # 拉取最新版本号
          curl -fsSL "https://github.com/koishijs/registry/raw/refs/heads/release/version.txt" -o koi/version.txt
          CURRENT_HASH=$(cat koi/version.txt | tr -d '[:space:]')
          
          # 拉取最新哈希文件
          curl -fsSL "https://github.com/koishijs/registry/raw/refs/heads/release/index.${CURRENT_HASH}.json" -o "koi/index.${CURRENT_HASH}.json"
          
          # 生成通用入口
          cp "koi/index.${CURRENT_HASH}.json" koi/index.json

      - name: Upload Koi Artifact
        uses: actions/upload-artifact@v4
        with:
          name: koi-data
          path: koi/
          retention-days: 1
