name: 部署到 Pages
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve latest run-ids of koi & astr
        id: runids
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          KOI_WF_ID=$(gh api "/repos/${{ github.repository }}/actions/workflows/koi.yml" --jq '.id')
          ASTR_WF_ID=$(gh api "/repos/${{ github.repository }}/actions/workflows/astr.yml" --jq '.id')

          KOI_RUN_ID=$(gh api "/repos/${{ github.repository }}/actions/workflows/$KOI_WF_ID/runs?per_page=1" --jq '.workflow_runs[0].id')
          ASTR_RUN_ID=$(gh api "/repos/${{ github.repository }}/actions/workflows/$ASTR_WF_ID/runs?per_page=1" --jq '.workflow_runs[0].id')

          echo "koi_run_id=$KOI_RUN_ID" >> "$GITHUB_OUTPUT"
          echo "astr_run_id=$ASTR_RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download Koi Data
        uses: actions/download-artifact@v4
        with:
          name: koi-data
          path: dist/koi
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.runids.outputs.koi_run_id }}

      - name: Download Astr Data
        uses: actions/download-artifact@v4
        with:
          name: astr-data
          path: dist/astr
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.runids.outputs.astr_run_id }}

      - name: Build unified markets page
        run: |
          # 注意这里直接生成到根目录 dist/index.html
          cat > dist/index.html << 'PAGE'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="utf-8"/>
            <meta name="viewport" content="width=device-width, initial-scale=1"/>
            <title>插件市场</title>
            <style>
              :root { color-scheme: light dark; --bg: #0f172a; --card: #020617; --accent: #3b82f6; --border: #1e293b; --text: #e5e7eb; }
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); }
              .wrap { max-width: 1080px; margin: 0 auto; padding: 16px; }
              h1 { margin-bottom: 8px; font-size: 1.6rem; }
              .sub { color: #94a3b8; margin-bottom: 12px; }
              .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
              .tab { padding: 6px 14px; border-radius: 999px; border: 1px solid var(--border); cursor: pointer; background: transparent; color: var(--text); }
              .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
              .stats { display: flex; gap: 8px; font-size: 0.85rem; color: #94a3b8; margin-bottom: 10px; }
              .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
              .card { background: var(--card); border-radius: 10px; border: 1px solid var(--border); padding: 12px; display: flex; flex-direction: column; gap: 6px; }
              .card-name { font-weight: 600; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
              .badge { font-size: 0.75rem; padding: 2px 8px; border-radius: 999px; background: rgba(59,130,246,0.18); color: #93c5fd; }
              .desc { font-size: 0.85rem; color: #cbd5e1; }
              .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
              .tag { background: rgba(59,130,246,0.12); color: #93c5fd; border-radius: 999px; padding: 2px 8px; font-size: 0.75rem; }
              a.repo { color: #60a5fa; text-decoration: none; font-size: 0.75rem; word-break: break-all; }
              a.repo:hover { text-decoration: underline; }
              .loading { margin-top: 12px; color: #94a3b8; }
              .error { color: #f87171; margin-top: 8px; }
              .footer { margin-top: 20px; font-size: 0.8rem; color: #64748b; }
            </style>
          </head>
          <body>
            <div class="wrap">
              <h1>插件市场</h1>
              <p class="sub">Koi / Astr 插件统一浏览与搜索</p>
              <div class="tabs">
                <button class="tab active" data-source="koi">Koi</button>
                <button class="tab" data-source="astr">Astr</button>
              </div>
              <div class="stats"><span id="count">插件数量：-</span></div>
              <div class="grid" id="grid"></div>
              <div id="status" class="loading">正在加载数据…</div>
              <div class="footer">数据来自上游官方仓库，仅供镜像与检索使用。</div>
            </div>
            <script>
              const TAB_MAP = {
                // 使用相对于根目录的路径
                koi: { url: './koi/index.json' },
                astr: { url: './astr/plugin_cache_original.json' }
              };
              let cache = {};
              const grid = document.getElementById('grid');
              const status = document.getElementById('status');
              const countEl = document.getElementById('count');
              const tabs = document.querySelectorAll('.tab');
              let active = 'koi';

              function esc(s) { const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }

              // 核心修复：将 Koi 按命名空间分组的数据，拍平成一维插件数组
              function flattenData(data) {
                if (Array.isArray(data)) return data;
                let entries = [];
                if (typeof data === 'object' && data !== null) {
                  for (const key in data) {
                    if (Array.isArray(data[key])) {
                      entries = entries.concat(data[key]);
                    } else {
                      entries.push(data[key]);
                    }
                  }
                }
                return entries;
              }

              async function ensure(source) {
                if (cache[source]) return cache[source];
                const r = await fetch(TAB_MAP[source].url);
                if (!r.ok) throw new Error('HTTP ' + r.status);
                const j = await r.json();
                cache[source] = j;
                return j;
              }

              function render(source, data) {
                grid.innerHTML = '';
                status.textContent = '';
                // 使用拍平逻辑获取真正的插件列表
                const entries = flattenData(data);
                countEl.textContent = '插件数量：' + entries.length;
                entries.forEach(function (p) {
                  const c = document.createElement('div');
                  c.className = 'card';
                  const name = p.name || p.display_name || '';
                  const ver = p.version || '';
                  const desc = p.description || p.desc || '';
                  const repo = p.repo || p.repository || '';
                  const tags = p.tags || [];
                  let h = '<div class="card-name"><span>' + esc(name) + '</span>';
                  if (ver) h += '<span class="badge">' + esc(ver) + '</span>';
                  h += '</div>';
                  if (desc) h += '<div class="desc">' + esc(desc) + '</div>';
                  if (tags && tags.length) h += '<div class="tags">' + tags.map(function (t) { return '<span class="tag">' + esc(t) + '</span>'; }).join('') + '</div>';
                  if (repo) h += '<div>仓库：<a class="repo" target="_blank" rel="noopener" href="' + esc(repo) + '">' + esc(repo) + '</a></div>';
                  c.innerHTML = h;
                  grid.appendChild(c);
                });
              }

              async function switchTo(source) {
                active = source;
                tabs.forEach(function (b) { b.classList.toggle('active', b.getAttribute('data-source') === source); });
                status.className = 'loading';
                status.textContent = '正在加载…';
                try {
                  const d = await ensure(source);
                  render(source, d);
                } catch (e) {
                  status.className = 'error';
                  status.textContent = '加载失败：' + e.message;
                }
              }

              tabs.forEach(function (b) { b.addEventListener('click', function () { switchTo(b.getAttribute('data-source')); }); });
              switchTo(active);
            </script>
          </body>
          </html>
          PAGE
          
          touch dist/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
